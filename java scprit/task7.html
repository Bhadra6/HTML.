<html>
<head>
    <title>Movie Ticket Booking</title>
</head>

<body>

<h2>Movie Ticket Booking</h2>

<button onclick="bookTicket()">Book Ticket</button>

<script>
function bookTicket() {

    alert("Welcome to Movie Ticket Booking!");

    var confirmBooking = confirm("Do you want to book movie tickets?");

    if (confirmBooking) {

        var tickets = prompt("Enter the number of tickets:");

        if (tickets != null && tickets != "") {
            alert("Your booking for " + tickets + " ticket(s) is confirmed.");
        } else {
            alert("Booking completed without entering the number of tickets.");
        }

    } else {
        alert("Booking cancelled.");
    }
}
</script>

</body>
</html>
